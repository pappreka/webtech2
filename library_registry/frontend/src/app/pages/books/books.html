<mat-toolbar class="dark-toolbar">
  Könyvtár - Könyvek
  <span class="spacer"></span>
  <button mat-button (click)="add()">
    <mat-icon>add</mat-icon>
    Új könyv
  </button>
  <button mat-button (click)="logout()">Kilépés</button>
</mat-toolbar>

<div class="app-page">
  <mat-card class ="surface-card">
    <mat-card-title>Könyvlista</mat-card-title>

    <div *ngIf="loading" class="pad">Betöltés...</div>

    <table mat-table [dataSource]="books" class="mat-elevation-z1" *ngIf="!loading">
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Cím</th>
        <td mat-cell *matCellDef="let b">{{ b.title }}</td>
      </ng-container>

      <ng-container matColumnDef="author">
        <th mat-header-cell *matHeaderCellDef>Szerző</th>
        <td mat-cell *matCellDef="let b">{{ b.author }}</td>
      </ng-container>

      <ng-container matColumnDef="isbn">
        <th mat-header-cell *matHeaderCellDef>ISBN</th>
        <td mat-cell *matCellDef="let b">{{ b.isbn }}</td>
      </ng-container>

      <ng-container matColumnDef="year">
        <th mat-header-cell *matHeaderCellDef>Év</th>
        <td mat-cell *matCellDef="let b">{{ b.year ?? '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="copies">
        <th mat-header-cell *matHeaderCellDef>Példány</th>
        <td mat-cell *matCellDef="let b">{{ b.copies }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
  <th mat-header-cell *matHeaderCellDef>Művelet</th>
  <td mat-cell *matCellDef="let b">
    <button mat-icon-button (click)="remove(b)" aria-label="Törlés">
      <mat-icon>delete</mat-icon>
    </button>
  </td>
</ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div *ngIf="!loading && books.length === 0" class="pad">
      Nincs még könyv. Adj hozzá az “Új könyv”-el.
    </div>
  </mat-card>
</div>
